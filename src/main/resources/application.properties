spring.application.name=giga_test

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-123456}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}


# AI / GigaChat integration
ai.llm.enabled=${AI_LLM_ENABLED:false}
ai.llm.gigachat.api-url=${GIGACHAT_API_URL:https://gigachat.devices.sberbank.ru/api/v1/chat/completions}
ai.llm.gigachat.access-token=${GIGACHAT_ACCESS_TOKEN:}
ai.llm.gigachat.model=${GIGACHAT_MODEL:GigaChat-Pro}
ai.llm.gigachat.temperature=${GIGACHAT_TEMPERATURE:0.2}
